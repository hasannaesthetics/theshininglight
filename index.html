<script>
const SUPABASE_URL = 'https://sappkfchokaixfmmsotv.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // keep this but secure your DB with RLS
const WHATSAPP_PHONE = '6590106263';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let cart = [];

/* ================= FETCH PRODUCTS ================= */
async function fetchProducts() {
  try {
    const { data, error } = await supabaseClient
      .from('products')
      .select('*')
      .order('id');

    if (error) throw error;

    products = data || [];
    renderProducts();

  } catch (err) {
    console.error("Supabase error:", err);
    document.getElementById('product-grid').innerHTML =
      "<p style='text-align:center;'>Failed to load products</p>";
  }
}

/* ================= RENDER PRODUCTS ================= */
function renderProducts() {
  const grid = document.getElementById('product-grid');

  grid.innerHTML = products.map(p => {
    let imgUrl = 'https://via.placeholder.com/400';

    try {
      if (p.img && p.img.startsWith('[')) {
        const parsed = JSON.parse(p.img);
        imgUrl = Array.isArray(parsed) ? parsed[0] : p.img;
      } else {
        imgUrl = p.img || imgUrl;
      }
    } catch(e) {
      imgUrl = p.img || imgUrl;
    }

    return `
      <div class="card">
        <img src="${imgUrl}" class="card-img"
          onclick="window.location.href='product.html?id=${p.id}'">

        <div style="padding:20px;">
          <h3 class="serif"
            style="font-size:1.1rem; min-height:2.4em;
            display:flex; align-items:center; justify-content:center;">
            ${p.name}
          </h3>

          <p style="color:var(--accent); font-weight:600; margin:10px 0; font-size:1.2rem;">
            $${Number(p.price).toFixed(2)}
          </p>

          <button class="cart-btn"
            style="width:100%; justify-content:center;"
            onclick="addToCart(${p.id})">
            Add to Cart
          </button>
        </div>
      </div>
    `;
  }).join('');
}

/* ================= CART ================= */
function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);

  if (existing) existing.qty++;
  else cart.push({...p, qty:1});

  updateCart();

  if (window.innerWidth > 768) {
    openCart();
  }
}

function removeFromCart(id) {
  const item = cart.find(x => x.id === id);
  if (!item) return;

  if (item.qty > 1) item.qty--;
  else cart = cart.filter(x => x.id !== id);

  updateCart();
}

function updateCart() {
  const list = document.getElementById('cart-items');
  let total = 0;

  list.innerHTML = cart.map(item => {
    total += Number(item.price) * item.qty;

    return `
      <div style="display:flex; justify-content:space-between;
      margin-bottom:15px; border-bottom:1px solid #eee;
      padding-bottom:10px; text-align:left;">

        <div>
          <b>${item.name}</b><br>
          <small>${item.qty} x $${Number(item.price).toFixed(2)}</small>
        </div>

        <button onclick="removeFromCart(${item.id})"
          style="background:none; border:none; color:#d4533e;
          cursor:pointer; font-size:1.2rem;">
          ✕
        </button>
      </div>
    `;
  }).join('');

  document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
  document.getElementById('cart-count').textContent =
    cart.reduce((a,b) => a + b.qty, 0);

  document.getElementById('checkout-btn').disabled = cart.length === 0;
}

/* ================= MENU + OVERLAY ================= */
const overlay = document.createElement('div');
overlay.id = "overlay";
overlay.style.cssText = `
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1500;
`;
document.body.appendChild(overlay);

function openCart() {
  document.getElementById('cart-sidebar').classList.add('active');
  overlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function toggleCart() {
  const sidebar = document.getElementById('cart-sidebar');
  sidebar.classList.toggle('active');

  const isOpen = sidebar.classList.contains('active');
  overlay.style.display = isOpen ? 'block' : 'none';
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  menu.classList.toggle('active');

  const isOpen = menu.classList.contains('active');
  overlay.style.display = isOpen ? 'block' : 'none';
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

overlay.onclick = () => {
  document.getElementById('mobile-menu').classList.remove('active');
  document.getElementById('cart-sidebar').classList.remove('active');
  overlay.style.display = 'none';
  document.body.style.overflow = '';
};

/* ================= CHECKOUT ================= */
function showCheckout() {
  document.getElementById('order-items-list').innerHTML =
    cart.map(i => `<div>• ${i.name} x ${i.qty}</div>`).join('');

  document.getElementById('checkout-modal').style.display = 'flex';
}

function hideModals() {
  document.getElementById('checkout-modal').style.display = 'none';
}

function confirmOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const addr = document.getElementById('cust-addr').value.trim();

  if (!name || !phone || !addr) {
    alert("Fill all fields");
    return;
  }

  let msg = `*New Order from The Shining Light*\n\n`;
  msg += `*Name:* ${name}\n*Phone:* ${phone}\n*Address:* ${addr}\n\n*Items:*`;

  cart.forEach(i => msg += `\n- ${i.name} x ${i.qty}`);

  msg += `\n\n*Total: ${document.getElementById('cart-total').textContent}*`;

  window.open(
    `https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(msg)}`,
    '_blank'
  );

  const orderData = {
    customer_name: name,
    phone: phone,
    address: addr,
    items: JSON.stringify(cart),
    total: parseFloat(
      document.getElementById('cart-total').textContent.replace('$','')
    )
  };

  supabaseClient.from('orders').insert([orderData]);

  cart = [];
  updateCart();
  hideModals();
  toggleCart();
}

/* ================= INIT ================= */
fetchProducts();
</script>
