<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shining Light | Premium Islamic Artistry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root { --primary: #4b593e; --accent: #c5a059; --bg: #fdfcf8; --text: #2c2c2c; --white: #ffffff; --shadow: 0 10px 40px rgba(0, 0, 0, 0.08); --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; scroll-behavior: smooth; overflow-x: hidden; }
      h1, h2, h3, .serif { font-family: "Playfair Display", serif; }
      header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
      nav { max-width: 1300px; margin: 0 auto; padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
      .logo-img { height: 60px; cursor: pointer; }
      .nav-links { display: flex; gap: 2.5rem; list-style: none; }
      .nav-links a { text-decoration: none; color: var(--text); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; }
      .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
      .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
      .hamburger span { display: block; width: 25px; height: 2px; background: var(--primary); }
      .mobile-menu { position: fixed; top: 0; right: -100%; width: 80%; max-width: 300px; height: 100vh; background: var(--white); z-index: 2000; display: flex; flex-direction: column; padding: 100px 40px; gap: 2rem; box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05); transition: 0.4s; }
      .mobile-menu.active { right: 0; }
      .cart-btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; border: none; font-size: 0.9rem; }
      .cart-badge { background: #d4533e; color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.75rem; }
      .hero { padding: 180px 20px 80px; text-align: center; background: linear-gradient(to bottom, #f3f5f1, var(--bg)); }
      .container { max-width: 1300px; margin: 0 auto; padding: 4rem 2rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
      .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; text-align: center; }
      .card:hover { transform: translateY(-5px); }
      .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }
      .sidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100vh; background: white; z-index: 2100; box-shadow: -15px 0 50px rgba(0, 0, 0, 0.1); transition: 0.5s; padding: 40px; display: flex; flex-direction: column; }
      .sidebar.active { right: 0; }
      .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
      .modal-content { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
      .form-group { margin-bottom: 15px; }
      .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
      .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
      footer { background: var(--primary); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
      @media (max-width: 1024px) { .nav-links { display: none; } .hamburger { display: flex; } }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <img src="logo.png" alt="Logo" class="logo-img" onclick="window.location.href = 'index.html'" />
        <ul class="nav-links">
          <li><a href="#shop">Shop</a></li>
          <li><a href="#about">About</a></li>
        </ul>
        <div class="nav-actions">
          <button class="cart-btn" onclick="toggleCart()">Cart <span class="cart-badge" id="cart-count">0</span></button>
        </div>
        <div class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></div>
      </nav>
      <div class="mobile-menu" id="mobile-menu">
        <a href="#shop" onclick="toggleMobileMenu()">Shop</a>
        <a href="#about" onclick="toggleMobileMenu()">About</a>
        <button class="cart-btn" onclick="toggleCart(); toggleMobileMenu()">View Cart</button>
      </div>
    </header>
<main>
  <section class="hero">
    <div style="font-size: 3rem; margin-bottom: 1rem;">نور</div>
    <h1 class="serif" style="font-size: 3rem;">The Shining Light</h1>
    <p>Premium Islamic Artistry & Heritage</p>
  </section>

  <section id="shop" class="container">
    <div id="product-grid" class="grid"></div>
  </section>
</main>

<div class="sidebar" id="cart-sidebar">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 class="serif">Your Cart</h2>
    <button onclick="toggleCart()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
  </div>
  <div id="cart-items" style="flex:1; overflow-y:auto;"></div>
  <div style="border-top:1px solid #eee; padding-top:20px;">
    <div style="display:flex; justify-content:space-between; font-weight:600; font-size:1.2rem; margin-bottom:20px;">
      <span>Total:</span> <span id="cart-total">$0.00</span>
    </div>
    <button class="cart-btn" style="width:100%; justify-content:center; padding:15px;" id="checkout-btn" onclick="showCheckout()" disabled>Proceed to Checkout</button>
  </div>
</div>

<div class="modal-overlay" id="checkout-modal">
  <div class="modal-content">
    <h2 class="serif" style="margin-bottom:20px;">Checkout</h2>
    <div id="order-items-list" style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px; font-size:0.9rem;"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="cust-name" placeholder="Name" />
    </div>
    <div class="form-group">
      <label>WhatsApp Number</label>
      <input type="text" id="cust-phone" placeholder="e.g. 6590106263" />
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea id="cust-addr" rows="3" placeholder="Full Address"></textarea>
    </div>
    <button class="cart-btn" style="width:100%; justify-content:center; padding:15px;" onclick="confirmOrder()">Send via WhatsApp</button>
    <button onclick="hideModals()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer; color:#777;">Back to Cart</button>
  </div>
</div>

<footer>
  <p>&copy; 2025 The Shining Light. WhatsApp: +65 9010 6263</p>
</footer>

<script>
  const SUPABASE_URL = 'https://sappkfchokaixfmmsotv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhcHBrZmNob2thaXhmbW1zb3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzgxMTAsImV4cCI6MjA5MTMxNDExMH0.L-qETu03IZLqEhJoEx3Jy36JSDIxBg8hjhz4SYiMZYI';
  const WHATSAPP_PHONE = '6590106263';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let products = [];
  let cart = [];

  async function fetchProducts() {
    try {
      const { data, error } = await supabaseClient.from('products').select('*').order('id');
      if (error) throw error;
      products = data || [];
      renderProducts();
    } catch (err) {
      console.error("Error fetching products:", err);
      document.getElementById('product-grid').innerHTML = "<p>Unable to load collection. Please refresh.</p>";
    }
  }

  function renderProducts() {
    const grid = document.getElementById('product-grid');
    if (products.length === 0) {
      grid.innerHTML = "<p style='grid-column: 1/-1;'>No products available yet.</p>";
      return;
    }

    grid.innerHTML = products.map(p => {
      let imgUrl = 'https://via.placeholder.com/400';
      try {
        // Safe check for JSON images or string URLs
        if (p.img && p.img.startsWith('[')) {
          const parsed = JSON.parse(p.img);
          imgUrl = Array.isArray(parsed) ? parsed[0] : p.img;
        } else {
          imgUrl = p.img || imgUrl;
        }
      } catch(e) { imgUrl = p.img || imgUrl; }
      
      return `
        <div class="card">
          <img src="${imgUrl}" class="card-img" onclick="window.location.href='product.html?id=${p.id}'" alt="${p.name}">
          <div style="padding:20px;">
            <h3 class="serif" style="font-size:1.1rem; min-height:2.4em; display:flex; align-items:center; justify-content:center;">${p.name}</h3>
            <p style="color:var(--accent); font-weight:600; margin:10px 0; font-size:1.2rem;">$${Number(p.price).toFixed(2)}</p>
            <button class="cart-btn" style="width:100%; justify-content:center;" onclick="addToCart(${p.id})">Add to Cart</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    const exists = cart.find(x => x.id === id);
    if (exists) exists.qty++; else cart.push({...p, qty:1});
    updateCart();
    // Auto-open cart only on desktop
    if(window.innerWidth > 768) document.getElementById('cart-sidebar').classList.add('active');
  }

  function updateCart() {
    const list = document.getElementById('cart-items');
    let total = 0;
    list.innerHTML = cart.map(item => {
      total += (Number(item.price) * item.qty);
      return `<div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px; text-align: left;">
        <div><b>${item.name}</b><br><small>${item.qty} x $${Number(item.price).toFixed(2)}</small></div>
        <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:#d4533e; cursor:pointer; font-size:1.2rem;">✕</button>
      </div>`;
    }).join('');
    document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
    document.getElementById('cart-count').textContent = cart.reduce((a,b) => a+b.qty, 0);
    document.getElementById('checkout-btn').disabled = cart.length === 0;
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    updateCart();
  }

  function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
  function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('active'); }
  function hideModals() { document.getElementById('checkout-modal').style.display = 'none'; }

  function showCheckout() {
    document.getElementById('order-items-list').innerHTML = cart.map(i => `<div>• ${i.name} x ${i.qty}</div>`).join('');
    document.getElementById('checkout-modal').style.display = 'flex';
  }

  function confirmOrder() {
    const name = document.getElementById('cust-name').value.trim();
    const phone = document.getElementById('cust-phone').value.trim();
    const addr = document.getElementById('cust-addr').value.trim();
    
    if(!name || !phone || !addr) return alert("Please fill in all fields.");

    let msg = `*New Order from The Shining Light*\n\n*Name:* ${name}\n*Phone:* ${phone}\n*Address:* ${addr}\n\n*Items:*`;
    cart.forEach(i => msg += `\n- ${i.name} x ${i.qty}`);
    msg += `\n\n*Total:* ${document.getElementById('cart-total').textContent}`;

    // 1. Redirect immediately
    window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');

    // 2. Clear UI immediately (don't wait for database)
    const orderData = { 
      customer_name: name, 
      phone: phone, 
      address: addr, 
      items: JSON.stringify(cart), 
      total: parseFloat(document.getElementById('cart-total').textContent.replace('$','')) 
    };

    cart = [];
    updateCart();
    hideModals();
    toggleCart();

    // 3. Save to database in the background
    supabaseClient.from('orders').insert([orderData]).then(({error}) => {
      if(error) console.error("DB Save Error:", error);
    });
  }

  fetchProducts();
</script>
