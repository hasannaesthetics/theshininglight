<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details | The Shining Light</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root { --primary: #4b593e; --accent: #c5a059; --bg: #fdfcf8; --text: #2c2c2c; --white: #ffffff; }
      body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
      .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
      .serif { font-family: "Playfair Display", serif; }
      .btn { display: inline-block; background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
      .price { font-size: 2rem; color: var(--accent); font-weight: 600; margin: 20px 0; }
      .img-main { width: 100%; border-radius: 15px; margin-bottom: 20px; }
      .back-link { display: block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back-link">← Back to Shop</a>
      <div id="product-content">
        <p>Loading product...</p>
      </div>
    </div>

    <script>
      const SUPABASE_URL = 'https://sappkfchokaixfmmsotv.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhcHBrZmNob2thaXhmbW1zb3R2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzgxMTAsImV4cCI6MjA5MTMxNDExMH0.L-qETu03IZLqEhJoEx3Jy36JSDIxBg8hjhz4SYiMZYI';
      const WHATSAPP_PHONE = '6590106263';

      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');

      async function loadProduct() {
        const { data, error } = await supabaseClient.from('products').select('*').eq('id', productId).single();
        if (error || !data) {
          document.getElementById('product-content').innerHTML = "<p>Product not found.</p>";
          return;
        }

        const images = JSON.parse(data.img || '[]');
        const displayImg = Array.isArray(images) ? images[0] : data.img;

        document.getElementById('product-content').innerHTML = `
          <h1 class="serif" style="font-size: 2.5rem">${data.name}</h1>
          <img src="${displayImg}" class="img-main">
          <p class="price">$${data.price.toFixed(2)}</p>
          <p>${data.description || 'No description available.'}</p>
          <div style="margin-top: 30px">
            <button class="btn" onclick="orderNow('${data.name}', ${data.price})">Order on WhatsApp</button>
          </div>
        `;
      }

      function orderNow(name, price) {
        const msg = `Hi! I'm interested in purchasing:\n\n*${name}*\nPrice: $${price.toFixed(2)}\n\nPlease let me know the shipping details.`;
        window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
      }

      if(productId) loadProduct();
    </script>
  </body>
</html>
