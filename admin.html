<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.container { max-width:800px; margin:auto; background:white; padding:20px; border-radius:10px; }
input, textarea { width:100%; padding:10px; margin-bottom:10px; }
button { padding:10px 15px; cursor:pointer; }
.product { border-bottom:1px solid #ddd; padding:10px 0; }
</style>
</head>
<body>

<div id="login-box" class="container">
  <h2>Admin Login</h2>
  <input type="password" id="admin-pass" placeholder="Enter password">
  <button onclick="login()">Enter</button>
</div>

<div id="admin-panel" class="container" style="display:none;">
  <h2>Add Product</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Price">
  <input id="img" placeholder="Image URL">
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="addProduct()">Add Product</button>

  <hr>

  <h2>Products</h2>
  <div id="product-list"></div>

  <hr>

  <h2>Orders</h2>
  <div id="order-list"></div>
</div>

<script>
const PASSWORD = "ibrahim123"; // CHANGE THIS

const SUPABASE_URL = 'https://sappkfchokaixfmmsotv.supabase.co';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* LOGIN */
function login() {
  const input = document.getElementById('admin-pass').value;
  if (input === PASSWORD) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadProducts();
    loadOrders();
  } else {
    alert("Wrong password");
  }
}

/* ADD PRODUCT */
async function addProduct() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const img = document.getElementById('img').value;
  const desc = document.getElementById('desc').value;

  if (!name || !price) return alert("Fill required fields");

  await supabase.from('products').insert([
    { name, price, img, description: desc }
  ]);

  alert("Product added");
  loadProducts();
}

/* LOAD PRODUCTS */
async function loadProducts() {
  const { data } = await supabase.from('products').select('*').order('id');
  const list = document.getElementById('product-list');

  list.innerHTML = data.map(p => `
    <div class="product">
      <b>${p.name}</b> - $${p.price}
      <button onclick="deleteProduct(${p.id})">Delete</button>
    </div>
  `).join('');
}

/* DELETE PRODUCT */
async function deleteProduct(id) {
  await supabase.from('products').delete().eq('id', id);
  loadProducts();
}

/* LOAD ORDERS */
async function loadOrders() {
  const { data } = await supabase.from('orders').select('*').order('id', { ascending:false });
  const list = document.getElementById('order-list');

  list.innerHTML = data.map(o => `
    <div class="product">
      <b>${o.customer_name}</b> (${o.phone})<br>
      ${o.address}<br>
      Total: $${o.total}
    </div>
  `).join('');
}
</script>

</body>
</html>
